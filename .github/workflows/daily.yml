name: Daily AI Trends

on:
  schedule:
    - cron: '0 21 * * *'   # 매일 06:00 KST (UTC 21:00)
  workflow_dispatch:        # 수동 실행 버튼

permissions:
  contents: write
  models: read          # GitHub Models(무료 LLM) 호출용 — 한국어 요약 생성

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: 데이터 수집
        run: python3 scripts/collect.py
      - name: 한국어 요약 (GitHub Models)
        run: python3 scripts/summarize.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: 사이트 빌드
        run: python3 scripts/build.py
      - name: 변경사항 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/data.json index.html
          git diff --staged --quiet || git commit -m "chore: 트렌드 자동 갱신 ($(date -u +%Y-%m-%d))"
          git push

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v5
